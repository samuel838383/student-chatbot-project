<!DOCTYPE html>
<html>
<head>
  <title>Student Chatbot</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #4f46e5, #9333ea);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
    }

    h1 {
      font-size: 70px;
    }

    p {
      margin: 20px 0;
      font-size: 18px;
    }

    button {
      padding: 12px 25px;
      font-size: 18px;
      border: none;
      background: white;
      color: #333;
      cursor: pointer;
      border-radius: 8px;
    }

    button:hover {
      background: #ddd;
    }
  </style>
</head>

<body>

<div class="container">
  <h1><img src="logo1.png"> STUDENT CHATBOT</h1>
  <p>Your Smart Learning Assistant</p>

  <button onclick="startApp()">Start Chat</button>
</div>

<script>
function startApp() {
  window.location.href = "index.html";
}
</script>

</body>
</html>
